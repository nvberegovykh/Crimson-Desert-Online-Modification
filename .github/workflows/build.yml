# SPDX-License-Identifier: MIT
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check & build
        run: npm run build

  client:
    name: Client dxgi.dll (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: client/build/_deps
          key: cmake-deps-${{ hashFiles('client/CMakeLists.txt') }}
          restore-keys: cmake-deps-

      - name: Configure (CMake, Release, x64)
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release
        working-directory: client

      - name: Build Release
        run: cmake --build build --config Release --parallel
        working-directory: client

      - name: Upload dxgi.dll
        uses: actions/upload-artifact@v4
        with:
          name: dxgi-dll-x64
          path: client/build/Release/dxgi.dll
          if-no-files-found: error
          retention-days: 30
